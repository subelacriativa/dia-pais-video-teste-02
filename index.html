<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Surpresa de Realidade Aumentada ✨</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
        }
        
        #instrucao {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 94, 98, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 999;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 0.9rem;
            font-weight: bold;
            width: 85%;
            max-width: 320px;
            pointer-events: none;
        }

        #botao-play {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
            padding: 20px;
            box-sizing: border-box;
        }

        #botao-play h2 { font-size: 1.6rem; margin-bottom: 10px; }
        #botao-play p { font-size: 1rem; opacity: 0.9; }
    </style>
</head>
<body>

    <div id="botao-play">
        <h2>Preparar Mágica ❤️</h2>
        <p>Toque em qualquer lugar da tela para ligar a câmera e ativar o som.</p>
    </div>

    <div id="instrucao">Aponte a câmara para a frase na caneca! ✨</div>

    <script>
        // Criando um componente robusto do A-Frame para gerenciar o vídeo sem falhas
        AFRAME.registerComponent('controle-video', {
            init: function () {
                const video = document.getElementById('video-mensagem');
                
                this.el.addEventListener('markerFound', () => {
                    video.play().catch(err => console.log("Erro ao reproduzir:", err));
                });

                this.el.addEventListener('markerLost', () => {
                    video.pause();
                });
            }
        });
    </script>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-assets>
            <!-- LINK CORRIGIDO PARA O MODO RAW DO GITHUB -->
            <video 
                id="video-mensagem" 
                src="https://raw.githubusercontent.com/subelacriativa/ra/main/20260524_083410.mp4" 
                preload="auto" 
                loop="true" 
                crossorigin="anonymous" 
                playsinline 
                webkit-playsinline>
            </video>
        </a-assets>

        <!-- Adicionado o componente 'controle-video' aqui -->
         <!-- Marcador com o componente de controle -->
        <a-marker type="pattern" url="https://raw.githubusercontent.com/subelacriativa/ra/main/pattern-Montserrat%20Extra%20Bold.patt" id="marcador" controle-video>
            
            <!-- 
               Ajustes feitos:
               1. material="side: double" -> Faz o vídeo aparecer mesmo se estiver de cabeça para baixo ou invertido.
               2. position="0 0.2 0" -> Eleva o vídeo 20cm acima da caneca para não sumir dentro dela.
               3. scale="1.5 1.5 1.5" -> Aumenta o tamanho do plano para garantir que você o veja.
            -->
            <a-video 
                src="#video-mensagem" 
                position="0 0.2 0" 
                rotation="-90 0 0" 
                scale="1.5 1.5 1.5"
                material="side: double;">
            </a-video>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const botaoPlay = document.getElementById('botao-play');
        const video = document.getElementById('video-mensagem');

        botaoPlay.addEventListener('click', function() {
            // Desbloqueia o áudio reproduzindo e pausando imediatamente
            video.play().then(() => {
                video.pause(); 
                esconderBotao();
            }).catch(error => {
                console.log("Interação aceita:", error);
                esconderBotao();
            });
        });

        function esconderBotao() {
            botaoPlay.style.opacity = '0';
            setTimeout(() => {
                botaoPlay.style.display = 'none';
            }, 500);
        }
    </script>
</body>
</html>
